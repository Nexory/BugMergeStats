name: "gh-contrib-stats"
description: "Generate a static SVG contribution card and commit it to your repo"
author: "Nexory"

branding:
  icon: "bar-chart-2"
  color: "blue"

inputs:
  github_token:
    description: "GitHub token with read access to issues, PRs, and timelines"
    required: true
  username:
    description: "GitHub username to generate the card for"
    required: true
  output_path:
    description: "Output SVG file path relative to repo root"
    required: false
    default: "card.svg"
  theme:
    description: "Card theme: dark or light"
    required: false
    default: "dark"
  commit_message:
    description: "Git commit message for the updated card"
    required: false
    default: "chore: update contribution card [skip ci]"
  cache_ttl_minutes:
    description: "How long to cache API results in minutes before re-fetching"
    required: false
    default: "1380"

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Generate contribution card
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        npx --yes gh-contrib-stats@latest \
          --user "${{ inputs.username }}" \
          --output "${{ inputs.output_path }}" \
          --theme "${{ inputs.theme }}" \
          --cache-ttl "${{ inputs.cache_ttl_minutes }}"

    - name: Commit updated card
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add "${{ inputs.output_path }}" .gh-contrib-stats-cache.json || true
        git diff --cached --quiet || git commit -m "${{ inputs.commit_message }}"
        git push
